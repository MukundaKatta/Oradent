services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oradent
      POSTGRES_USER: oradent
      POSTGRES_PASSWORD: oradent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oradent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./packages/server
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://oradent:oradent@db:5432/oradent
      REDIS_URL: redis://redis:6379

  web:
    build: ./packages/web
    ports:
      - "3000:3000"
    depends_on:
      - server
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://server:4000
      NEXT_PUBLIC_WS_URL: ws://server:4000

volumes:
  pgdata:
  uploads:
